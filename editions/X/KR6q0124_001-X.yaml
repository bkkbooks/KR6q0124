body:
  text: 永平道者山大雲峯禪寺嗣祖居幻沙門釋文冲重校編集恭惟古聖罔伐己能緬想前賢靡彰自德然釋典有先自行化他之教儒宗標內舉不避親之文師常示徒云因觀弘明集中先德有檢覆三業門云夫剋責之情猶昧審的之旨未彰故以事檢校心凡所修習既知不及彌增疎忽何謂檢校我此身從旦至中從中至暮從暮至夜從夜至曉乃至一時一刻一念一頃有幾心幾行幾善幾惡幾心欲摧伏煩惱幾心欲降伏魔怨幾心念三寶四諦幾心悟苦空無常幾心念報父母恩慈幾心願代眾生受苦幾心發念菩薩道業幾心欲布施持戒幾心欲忍辱精進幾心欲禪寂顯慧幾心欲慈濟五道幾心欲勸勵行所難行幾心欲超求辨所難辨幾心欲忍苦建立佛法幾心欲作佛化度羣生上已檢心次復檢口如上時刻旦已來已得演說幾句深義已得披讀幾許經典已得理誦幾許文字已得幾回歎佛功德已得幾回稱菩薩行已得幾回讚歎隨喜已得幾回回向發願次復檢身如上時刻已得幾回屈身禮佛幾拜已得幾回屈身禮法禮僧已得幾回執勞掃塔塗地已得幾回燒香散花已得幾回掃除塵垢正列供具已得幾回懸旛表剎合掌供養已得幾回遶佛恭敬十百千匝如是檢察會理甚少違道極多白淨之業纔不足言煩惱重障森然滿目闇礙轉積解脫何由如上校察自救無功何有時閑議人善惡故須三業自相訓責知我所作幾善幾惡是以若不自先檢責何以化導羣機故菩薩為度眾生故先自修行所以淨名經云資財無量攝諸貧民奉戒清淨攝諸毀禁以忍調行攝諸恚怒以大精進攝諸懈怠一心禪定攝諸亂意以決定慧攝諸無智又經云自持戒勸他持戒自坐禪勸他坐禪大智度論云本師釋迦牟尼佛不捨穿針之福祖師龍樹菩薩釋云如百歲翁翁舞何以故為教兒孫故況未居究竟位全是自利門從十信初心歷十住十行十回向十地直至等覺佛前普賢位猶自利利他門登妙覺位至佛後普賢方純是利他之行是以行明因示誨次遂請問所行或因師自說編紀二三既自治之行可觀則攝化之門弗墜有斯益故乃敢敘焉今具錄每日晝夜中間總行一百八件佛事具列如後第一一生隨處常建法華堂莊嚴淨土第二常晝夜六時普為一切法界眾生代修法華懺第三常修安養淨業所有毫善悉皆念念普為一切法界有情同回向往生第四或時坐禪普願一切法界眾生同入禪智法明妙性第五每夜上堂說法普為十方禪眾法界有情同悟心宗一乘妙旨第六每日常念妙法蓮華經一部七卷逐品上報四重深恩下為一切法界二十五有含識願證二十五種三昧垂形十界同化有情上報四恩者一報師長訓誘恩二報父母養育恩三報國王荷負恩四報施主供給恩下為二十五有者一為地獄界證離垢三昧二為旁生界證不退三昧三為餓鬼界證心樂三昧四為修羅界證歡喜三昧五為南閻浮提證如幻三昧六為東弗婆提證日光三昧七為西瞿耶尼證月光三昧八為北單越證熱𦦨三昧九為四天王證不動三昧十為三十三天證難伏三昧十一為𦦨摩天證閱意三昧十二為兜率天證青色三昧十三為化樂天證黃色三昧十四為他化自在天證赤色三昧十五為初禪證白色三昧十六為梵王天證種種三昧十七為二禪證雙三昧十八為三禪證雷音三昧十九為四禪證霪雨三昧二十為阿那含天證照鏡三昧二十一為無想天證空三昧二十二為空處天證常三昧二十三為識處天證樂三昧二十四為無所有處天證我三昧二十五為非想非非想天證淨三昧第七每日常誦般若心經八卷普為法界八苦眾生離苦解脫第八每日常讀大方廣佛華嚴淨行品依文發一百四十大願普令一切法界眾生見聞之中皆得入道第九常六時誦千手千眼大悲陀羅尼普為一切法界眾生懺六根所造一切障第十常六時誦加句佛頂尊勝陀羅尼普為法界一切眾生懺六根所作一切罪第十一普為一切法界眾生晝夜六時皈命敬禮三寶及晨朝禮十方佛一禮佛寶稽首圓滿遍知覺寂靜平等本真源相好嚴特非有無慧光普照微塵剎一心敬禮十方三世盡虗空遍法界微塵剎土中一切常住佛寶兩足尊此界他方人間天上法寶真身舍利形像一一塔廟唯願三寶威神覆護所有諸佛住處願與法界一切眾生一一分身悉往禮拜雖不得能禮之身所禮之佛然不壞幻相影現法界二禮法寶稽首湛然真妙法甚深十二修多羅非文非字非言宣一音隨類皆明了一心敬禮十方三世盡虗空遍法界微塵剎土中一切常住法寶離欲尊天上人間龍宮海藏十二部經一切聖典同前禮佛運心所有經卷之處一一分身悉往禮拜三禮僧寶稽首清淨諸賢聖十方和合應真僧執持禁戒無有違振錫𢹂瓶利含識一心敬禮十方三世盡虗空遍法界微塵剎土中一切常住僧寶眾中尊寶剎淨土巖阿石室諸大菩薩緣覺聲聞一切賢聖同前禮佛運心所有僧住之處一一分身悉往禮拜次執爐云嚴持香花如法供養願此香花雲以為光明臺供養一切佛經法諸菩薩聲聞緣覺眾及一切天仙受用作佛事普願一切法界眾生悉入我供養法界海中同證無生一實境界一心擎爐觀此香烟變為珍珠瓔珞香臺寶樓天衣妙樂異果華雲種種供具供養十方諸佛大作佛事禮十方佛一心敬禮東方善德佛盡東方法界一切諸佛一心敬禮東南方無憂德佛盡東南方法界一切諸佛一心敬禮南方栴檀德佛盡南方法界一切諸佛一心敬禮西南方寶施佛盡西南方法界一切諸佛一心敬禮西方無量明佛盡西方法界一切諸佛一心敬禮西北方華德佛盡西北方法界一切諸佛一心敬禮北方相德佛盡北方法界一切諸佛一心敬禮東北方三乘行佛盡東北方法界一切諸佛一心敬禮上方廣眾德佛盡上方法界一切諸佛一心敬禮下方明德佛盡下方法界一切諸佛第十二每日普為法界一切眾生禮釋迦如來真身舍利寶塔願罪滅福生障消道現第十三自製大乘悲智六百願文每日普為一切法界眾生發願禮拜第十四晨朝禮和尚本師靈鷲山中釋迦牟尼佛普願一切法界眾生紹隆三寶第十五晨朝禮妙法蓮華經真淨妙法普願一切法界眾生同證法華三昧咸生彌陀淨方第十六晨朝禮阿闍黎金色世界大智文殊師利菩薩摩訶薩普願一切法界眾生入法界門開根本智第十七晨朝普為一切法界眾生頂戴阿彌陀佛行道承廣大之願力慕極樂之圓修第十八晨朝普為一切法界眾生旋繞念一字王心陀羅尼普願圓證心王居總持位真言曰唵部淋潑第十九晨朝普為一切法界眾生旋繞念釋迦牟尼佛願繼能仁成寂滅忍第二十晨朝普為一切法界眾生旋繞念文殊師利菩薩摩訶薩願成無性妙慧作法王之子第二十一午時禮皈依主安樂世界阿彌陀佛普願一切法界眾生頓悟自心成妙淨土第二十二午時禮大方廣佛華嚴經不思議藏普願一切法界眾生入緣起性德之門遊毗盧大願之海第二十三午時禮懺悔師銀色世界大行普賢菩薩摩訶薩普願一切法界眾生了罪性空成無生懺第二十四午時普為一切法界眾生旋繞念觀世音本身陀羅尼普願具圓通身成普門行真言曰唵悉羅毗婆尼薩訶第二十五午時普為一切法界眾生旋繞念多寶佛願分身散形同證一乘第二十六午時普為一切法界眾生旋繞念普賢菩薩摩訶薩願成差別之智門運無始終之妙行第二十七午時普為一切法界眾生頂戴觀音行道成觀音實際之身運同體大悲之行第二十八黃昏禮教授師兜率天宮當來下生彌勒尊佛普願一切法界眾生成無等真慈繼一生補處第二十九黃昏禮大般若波羅蜜多經清淨法藏普願一切法界眾生行無所得之方便具一切種智之圓門第三十黃昏禮同學法侶寶陀洛山大慈大悲救苦觀世音菩薩摩訶薩盡十方法界一切菩薩摩訶薩普願一切法界眾生入圓通門運法界行第三十一黃昏時普願一切法界眾生旋繞念文殊心陀羅尼普願入阿字門了無生性真言曰阿囉跛佐曩第三十二黃昏時普為一切法界眾生旋繞念釋迦牟尼分身佛願廣布身雲入相成道第三十三黃昏時普為一切法界眾生旋繞念觀世音菩薩摩訶薩願具十四無畏福佑眾生第三十四黃昏時普為一切法界眾生頂戴釋迦寶塔行道普為紹隆佛種永為法界福田第三十五初夜禮證明師七寶塔中過去多寶佛盡十方三世一切諸佛普願一切法界眾生不違本願助轉法輪第三十六初夜禮大寶積經真如海藏普願一切法界眾生依了義經通佛妙旨第三十七初夜禮慈悲導師安樂世界大勢至菩薩摩訶薩及一切清淨大海眾普願一切法界眾生引導利濟眾生同了唯心淨土第三十八初夜普為一切法界眾生旋繞念觀音蓮華部心陀羅尼普願具大悲門圓自在慧真言曰唵阿盧勒繼娑嚩訶第三十九初夜普為一切法界眾生旋繞念彌勒慈尊佛願生內院親成法忍第四十初夜普為一切法界眾生旋繞念大勢至菩薩摩訶薩願攝諸根淨念相繼託質蓮臺第四十一初夜普為一切法界眾生頂戴法華經行道盡入法華三昧同歸究竟一乘第四十二中夜禮十方釋迦牟尼分身佛普願一切法界眾生不動道場分身百憶第四十三中夜禮大般涅槃經諸佛祕藏普願一切法界眾生明自性心住祕密藏第四十四中夜禮大慈大悲救苦地藏菩薩摩訶薩普願一切法界眾生證無垢三昧度惡趣眾生第四十五中夜普為一切法界眾生旋繞念佛頂金輪陀羅尼普願無見頂相作法輪王真言曰唵齒臨第四十六中夜普為一切法界眾生旋繞念藥師琉璃光佛願成本願風輪往生寶剎第四十七中夜普為一切法界眾生旋繞念藥王菩薩摩訶薩願作大醫王救度一切第四十八中夜普為一切法界眾生頂戴華嚴經行道咸入海印三昧頓悟法界圓宗第四十九後夜禮東方滿月世界藥師琉璃光佛普願一切法界眾生發大誓心攝無邊眾第五十後夜禮般若波羅蜜多心經無生奧典普為一切法界眾生冥合真心了無所得第五十一後夜禮藥王菩薩摩訶薩普願一切法界眾生說妙法藥除煩惱病第五十二後夜普為一切法界眾生旋繞念金剛經心中心陀羅尼普願證金剛三昧堅固佛身真言曰唵烏倫尼薩婆訶第五十三後夜普為一切法界眾生旋繞念阿彌陀佛願成無上慧攝化有情第五十四後夜普為一切法界眾生頂戴大般若經行道願入無住觀門成就無生法忍第五十五後夜普為一切法界眾生旋繞念地藏菩薩摩訶薩願布無緣慈救三塗苦第五十六稍暇時旋繞行道普願一切法界眾生得紫金光身相好圓滿第五十七看讀大乘經典普願一切法界眾生同明佛慧第五十八晝夜六時普為一切法界眾生念七如來名號念寶勝如來願一切眾生積劫塵勞悉皆清淨念離怖畏如來願一切眾生離五怖畏得涅槃樂念廣博身如來願一切眾生咽喉廣大禪悅充足念甘露王如來願一切眾生飲甘露味成大菩提念妙色身如來願一切眾生離醜陋形相好圓滿念多寶如來願一切眾生永離貧窮法財具足念阿彌陀如來願一切眾生離惡趣形神栖淨土第五十九晨朝普為一切法界眾生受持大乘六念一念佛願成佛身二念法願轉法輪三念僧欲覆護眾四念戒欲滿諸願五念施捨諸煩惱六念天欲滿天中天一切種智第六十晝夜六時普為盡十方一切法界眾生逐方焚香供養十方面三寶願此香變為珍寶瓔珞樓臺寶閣音樂花果衣服飲食種種供具等供養十方諸佛第六十一晝夜六時普為盡法界眾生逐方皈命十方面三寶願入三乘之聖位成五分之法身第六十二晝夜