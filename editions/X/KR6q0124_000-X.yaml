body:
  text: 永明壽禪師顯跡五代宋初我世宗憲皇帝嘉其專修淨業普利眾生錫封妙圓正修智覺禪師標為佛門正宗其書如宗鏡錄萬善同歸集心賦已入大藏武林黃君松石搜訪散佚又得師山居詩及永明道蹟既梓於維揚而自行錄一編為師百八實修尤下學上達之津筏甞𢹂之京師雲間大司𭁵張公以見之晚不及奏列藏函為憾公薨任子伯耕請校刊流布以資公冥福讀是編者敬信持行人人如獲師印彌陀塔其亦公之神所默啟夫西原居士蔣恭棐為識其緣起時乾隆十年夏五月朔日
